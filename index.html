<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Erfa | Farah</title>
  <meta name="description" content="Sebuah hadiah ulang tahun spesial untukmu 🎁" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose:    { 50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e' },
            blush:   { 50:'#fdf2f8',100:'#fce7f3',200:'#fbcfe8',300:'#f9a8d4',400:'#f472b6',500:'#ec4899' },
            violet:  { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',300:'#c4b5fd',400:'#a78bfa',500:'#8b5cf6' },
            cream:   '#fef6f0',
          },
          fontFamily: {
            display: ['"Quicksand"', 'sans-serif'],
            body:    ['"Nunito"', 'sans-serif'],
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%':      { transform: 'translateY(-12px)' },
            },
            fadeInUp: {
              '0%':   { opacity: '0', transform: 'translateY(30px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%':   { opacity: '0', transform: 'scale(0.8)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            heartPop: {
              '0%':   { transform: 'scale(0) translateY(0)', opacity: '1' },
              '50%':  { transform: 'scale(1.2) translateY(-30px)', opacity: '1' },
              '100%': { transform: 'scale(0.8) translateY(-80px)', opacity: '0' },
            },
            confettiFall: {
              '0%':   { transform: 'translateY(-10vh) rotate(0deg)', opacity: '1' },
              '100%': { transform: 'translateY(110vh) rotate(720deg)', opacity: '0' },
            },
            pulse: {
              '0%, 100%': { opacity: '1' },
              '50%':      { opacity: '.6' },
            },
            bounce: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%':      { transform: 'translateY(-8px)' },
            },
          },
          animation: {
            float:       'float 3s ease-in-out infinite',
            fadeInUp:    'fadeInUp 0.8s ease-out forwards',
            fadeIn:      'fadeIn 0.6s ease-out forwards',
            scaleIn:     'scaleIn 0.5s ease-out forwards',
            heartPop:    'heartPop 1s ease-out forwards',
            confettiFall:'confettiFall 3s ease-in-out forwards',
            pulse:       'pulse 2s ease-in-out infinite',
            bounce:      'bounce 1s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #fdf2f8, #fef6f0, #f5f3ff);
      min-height: 100vh;
      min-height: 100dvh;
    }
    /* Allow scrolling on ending scene */
    body.ending-active { overflow-y: auto; }

    /* Typing cursor */
    .typing-cursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: #ec4899; margin-left: 2px;
      animation: blink 0.7s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Scenes */
    .scene {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
      opacity: 0; pointer-events: none; transform: scale(0.97);
    }
    /* Ending scene needs to scroll */
    #scene-ending {
      position: fixed; inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scene.active { opacity: 1; pointer-events: auto; transform: scale(1); }

    /* Character */
    .character-img {
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 20px 30px rgba(236,72,153,0.2));
      transition: transform 0.3s ease;
    }

    /* Dialog glass */
    .dialog-box {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(251,207,232,0.6);
    }

    /* Choice buttons */
    .choice-btn {
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .choice-btn::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg, rgba(251,113,133,0.15), rgba(196,181,253,0.15));
      opacity:0; transition: opacity 0.3s ease;
    }
    .choice-btn:hover::before { opacity:1; }
    .choice-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 25px rgba(236,72,153,0.25);
    }

    .heart-float { position:fixed; pointer-events:none; font-size:1.5rem; z-index:100; }
    .confetti { position:fixed; top:-10px; z-index:200; border-radius:2px; }
    .petal { position:fixed; pointer-events:none; opacity:0.4; z-index:0; font-size:1.2rem; }
    .next-btn { animation: pulse 2s ease-in-out infinite; }
    #heartBtn { transition: transform 0.15s ease; }
    #heartBtn:active { transform: scale(0.85); }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#fda4af; border-radius:10px; }

    /* ======================== ENDING SCENE STYLES ======================== */

    /* Ending uses same pastel bg */
    #scene-ending.active {
      background: linear-gradient(135deg, #fdf2f8, #fef6f0, #f5f3ff);
    }

    /* ======================== 3D GIFT BOX ======================== */
    .gift-scene {
      perspective: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 2rem 1rem;
    }

    .gift-wrapper {
      position: relative;
      width: 180px; height: 180px;
      transform-style: preserve-3d;
      animation: giftFloat 3s ease-in-out infinite, giftSpin 8s linear infinite;
      cursor: pointer;
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    @media (min-width: 640px) {
      .gift-wrapper { width: 220px; height: 220px; }
    }

    .gift-wrapper.opened {
      animation: none;
      transform: scale(0) rotateY(720deg);
      opacity: 0;
      pointer-events: none;
    }

    @keyframes giftFloat {
      0%, 100% { transform: translateY(0) rotateX(-15deg); }
      50%      { transform: translateY(-18px) rotateX(-15deg); }
    }
    @keyframes giftSpin {
      0%   { filter: drop-shadow(0 20px 30px rgba(236,72,153,0.2)); }
      50%  { filter: drop-shadow(0 25px 40px rgba(164,113,253,0.25)); }
      100% { filter: drop-shadow(0 20px 30px rgba(236,72,153,0.2)); }
    }

    /* Gift box faces */
    .gift-box {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
    }

    .gift-face {
      position: absolute;
      width: 100%; height: 100%;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      backface-visibility: visible;
    }

    .gift-front  { background: linear-gradient(135deg, #f472b6, #ec4899); transform: translateZ(90px); }
    .gift-back   { background: linear-gradient(135deg, #ec4899, #db2777); transform: translateZ(-90px) rotateY(180deg); }
    .gift-left   { background: linear-gradient(135deg, #f9a8d4, #f472b6); transform: rotateY(-90deg) translateZ(90px); }
    .gift-right  { background: linear-gradient(135deg, #f472b6, #f9a8d4); transform: rotateY(90deg) translateZ(90px); }
    .gift-bottom { background: linear-gradient(135deg, #db2777, #be185d); transform: rotateX(-90deg) translateZ(90px); }

    @media (min-width: 640px) {
      .gift-front  { transform: translateZ(110px); }
      .gift-back   { transform: translateZ(-110px) rotateY(180deg); }
      .gift-left   { transform: rotateY(-90deg) translateZ(110px); }
      .gift-right  { transform: rotateY(90deg) translateZ(110px); }
      .gift-bottom { transform: rotateX(-90deg) translateZ(110px); }
    }

    /* Ribbon on each face */
    .gift-face::before {
      content: '';
      position: absolute;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      opacity: 0.85;
    }
    .gift-front::before, .gift-back::before {
      width: 18%; height: 100%;
      left: 41%; top: 0;
    }
    .gift-left::before, .gift-right::before {
      width: 18%; height: 100%;
      left: 41%; top: 0;
    }
    .gift-bottom::before {
      width: 18%; height: 100%;
      left: 41%; top: 0;
    }
    .gift-face::after {
      content: '';
      position: absolute;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      opacity: 0.85;
    }
    .gift-front::after, .gift-back::after {
      height: 18%; width: 100%;
      top: 41%; left: 0;
    }
    .gift-left::after, .gift-right::after {
      height: 18%; width: 100%;
      top: 41%; left: 0;
    }
    .gift-bottom::after {
      height: 18%; width: 100%;
      top: 41%; left: 0;
    }

    /* Gift lid (top face) */
    .gift-lid {
      position: absolute;
      width: 110%; height: 30px;
      left: -5%;
      top: -32px;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      transform-origin: bottom center;
    }
    .gift-lid-top {
      position: absolute;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #f472b6, #a78bfa);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 8px 8px 0 0;
      transform: rotateX(0deg);
    }
    .gift-lid-top::before {
      content: '';
      position: absolute;
      width: 16%; height: 100%;
      left: 42%; top: 0;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      opacity: 0.85;
      border-radius: 4px 4px 0 0;
    }
    .gift-wrapper.opened .gift-lid {
      transform: rotateX(-120deg) translateY(-30px);
    }

    /* Bow */
    .gift-bow {
      position: absolute;
      top: -55px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      z-index: 10;
      animation: bowBounce 2s ease-in-out infinite;
    }
    @keyframes bowBounce {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.1); }
    }

    /* Click prompt */
    .gift-prompt {
      margin-top: 2rem;
      animation: pulse 2s ease-in-out infinite;
      cursor: pointer;
    }

    /* ======================== CHARACTER REVEAL ======================== */
    .char-reveal-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 1.5rem 1rem;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .char-reveal-container.visible {
      display: flex;
      opacity: 1;
    }

    /* 3D tilt card */
    .char-3d-wrapper {
      perspective: 800px;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
    }
    .char-3d-card {
      position: relative;
      display: inline-block;
      padding: 1.5rem;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(251,207,232,0.5);
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(236,72,153,0.15);
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
      transform-style: preserve-3d;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    .char-3d-card:active { cursor: grabbing; }
    .char-3d-card img {
      display: block;
      margin: 0 auto;
      width: 200px;
      max-width: 60vw;
      pointer-events: none;
      transform: translateZ(30px);
    }

    /* Shine overlay */
    .char-3d-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 1.25rem;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.4) 45%,
        rgba(255,255,255,0.1) 50%,
        transparent 55%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }
    .char-3d-card:hover::before { opacity: 1; }

    /* Sparkles */
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes sparklePop {
      0%   { transform: scale(0) translate(0, 0); opacity: 1; }
      50%  { transform: scale(1.2) translate(var(--sx), var(--sy)); opacity: 1; }
      100% { transform: scale(0) translate(calc(var(--sx) * 2), calc(var(--sy) * 2)); opacity: 0; }
    }

    /* Birthday text in reveal */
    .reveal-title {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }
    .reveal-title.show {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-subtitle {
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.8s ease 0.3s;
    }
    .reveal-subtitle.show {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-btn {
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.8s ease 0.6s;
    }
    .reveal-btn.show {
      opacity: 1;
      transform: translateY(0);
    }

    .drag-hint {
      opacity: 0;
      transition: opacity 0.5s ease;
      animation: pulse 2s ease-in-out infinite;
    }
    .drag-hint.show { opacity: 1; }

    /* Birthday message bubbles */
    .bday-bubbles {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1rem;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }
    .bday-bubble {
      padding: 0.65rem 1rem;
      border-radius: 1rem 1rem 1rem 0.25rem;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #6b4c6e;
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bday-bubble.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .bday-bubble:nth-child(odd) {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(251,207,232,0.5);
      align-self: flex-start;
    }
    .bday-bubble:nth-child(even) {
      background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(167,139,250,0.15));
      backdrop-filter: blur(8px);
      border: 1px solid rgba(196,181,253,0.4);
      border-radius: 1rem 1rem 0.25rem 1rem;
      align-self: flex-end;
    }
    .bday-bubble .bubble-emoji {
      font-size: 1.1rem;
      margin-right: 0.3rem;
    }

    /* Double-tap popup */
    .doubletap-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 100;
      background: white;
      border-radius: 1.25rem;
      padding: 1.2rem 1.8rem;
      box-shadow: 0 20px 60px rgba(236,72,153,0.25);
      border: 1px solid rgba(251,207,232,0.6);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .doubletap-popup.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Mobile adjustments */
    @media (max-height: 700px) {
      .dialog-box { padding: 1rem !important; }
      .character-img { animation: none !important; }
    }
    @media (max-width: 480px) {
      .gift-wrapper { width: 150px; height: 150px; }
      .gift-front  { transform: translateZ(75px); }
      .gift-back   { transform: translateZ(-75px) rotateY(180deg); }
      .gift-left   { transform: rotateY(-90deg) translateZ(75px); }
      .gift-right  { transform: rotateY(90deg) translateZ(75px); }
      .gift-bottom { transform: rotateX(-90deg) translateZ(75px); }
      .gift-bow { font-size: 2.2rem; top: -45px; }
      .char-3d-card img { width: 160px; }
    }
  </style>
</head>
<body class="font-body">

  <!-- === GANTI MUSIK: ubah src audio di bawah ini === -->
  <audio id="bgMusic" loop preload="auto">
    <source src="./music/bgm.mp3" type="audio/mpeg" />
  </audio>

  <!-- ======================== FLOATING PETALS BG ======================== -->
  <div id="petalsContainer" class="fixed inset-0 pointer-events-none z-0"></div>

  <!-- ======================== SCENE 1: OPENING ======================== -->
  <section id="scene-opening" class="scene active">
    <div class="text-center px-6 relative z-10">
      <div class="text-6xl sm:text-7xl mb-6 animate-bounce"></div>

      <h1 class="font-display text-3xl sm:text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-rose-400 to-violet-400 mb-4 animate-fadeInUp">
        Hai, ada yang mau<br/>ngobrol sama kamu
      </h1>

      <p class="text-pink-400 text-base sm:text-lg mb-8 sm:mb-10 animate-fadeInUp" style="animation-delay: 0.3s; opacity:0;">
        Tenang, cuma bentar kok.
      </p>

      <button id="btnStart"
        onclick="startGame()"
        class="animate-fadeInUp bg-gradient-to-r from-pink-400 to-violet-400 text-white px-8 sm:px-10 py-3 sm:py-4 rounded-full text-lg sm:text-xl font-display font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 cursor-pointer"
        style="animation-delay: 0.6s; opacity:0;">
        Mulai
      </button>
    </div>

    <div class="absolute top-20 left-10 w-20 sm:w-32 h-20 sm:h-32 bg-pink-200 rounded-full opacity-20 animate-float"></div>
    <div class="absolute bottom-32 right-12 w-16 sm:w-24 h-16 sm:h-24 bg-violet-200 rounded-full opacity-20 animate-float" style="animation-delay: 1s;"></div>
    <div class="absolute top-40 right-20 w-12 sm:w-16 h-12 sm:h-16 bg-rose-200 rounded-full opacity-20 animate-float" style="animation-delay: 0.5s;"></div>
  </section>

  <!-- ======================== SCENE 2: VISUAL NOVEL ======================== -->
  <section id="scene-vn" class="scene" style="overflow: hidden;">
    <!-- Subtle background image -->
    <div style="position: absolute; inset: 0; background: url('./image/bg.jpg') center/cover no-repeat; opacity: 0.15; filter: blur(2px); z-index: 0;"></div>
    <div class="w-full h-full flex flex-col items-center justify-end relative" style="z-index: 1;">

      <!-- Character name tag -->
      <!-- <div class="absolute top-3 left-3 sm:top-4 sm:left-4 md:left-8 z-20">
        <div class="bg-gradient-to-r from-pink-400 to-violet-400 text-white px-4 py-1.5 sm:px-5 sm:py-2 rounded-full font-display font-bold text-xs sm:text-sm shadow-md">
          Buat Erfa
        </div>
      </div> -->

      <!-- Heart click button -->
      <!-- <button id="heartBtn"
        onclick="clickHeart(event)"
        class="fixed top-3 right-3 sm:top-4 sm:right-4 md:right-8 z-20 text-2xl sm:text-3xl cursor-pointer bg-white/60 backdrop-blur-sm rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shadow-md hover:bg-white/80 transition-all"
        title="Klik untuk pesan semangat!">
        ❤️
      </button> -->

      <!-- Dialog area -->
      <div class="w-full max-w-3xl px-3 sm:px-4 pb-4 sm:pb-6 relative z-10">

        <!-- Character (above dialog, behind it — ukuran diperbesar) -->
        <img id="characterImg"
          src="./image/normal.png"
          alt="Character"
          class="character-img w-80 sm:w-52 md:w-64 lg:w-72 object-contain absolute bottom-full left-20 sm:left-15 md:left-10 z-10"
          style="margin-bottom: -40px;"
        />

        <!-- Dialog box -->
        <div class="dialog-box rounded-2xl p-4 sm:p-6 shadow-xl relative z-20">
          <div id="dialogText" class="text-gray-700 text-base sm:text-lg md:text-xl leading-relaxed min-h-[2.5rem] sm:min-h-[3rem] font-body"></div>
          <div id="choicesContainer" class="mt-3 sm:mt-4 space-y-2 sm:space-y-3 hidden"></div>
          <div id="nextBtnContainer" class="mt-3 sm:mt-4 flex justify-end">
            <button id="btnNext"
              onclick="nextDialog()"
              class="next-btn bg-gradient-to-r from-pink-300 to-violet-300 text-white px-5 sm:px-6 py-2 sm:py-2.5 rounded-full font-display font-semibold text-xs sm:text-sm shadow-md hover:shadow-lg hover:scale-105 transition-all duration-300 cursor-pointer hidden">
              Next ▸
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>


  <!-- ======================== ROMANTIC MESSAGE POPUP ======================== -->
  <div id="romanticPopup"
    class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 bg-white/90 backdrop-blur-md rounded-2xl p-4 sm:p-6 shadow-2xl border border-pink-200 max-w-[280px] sm:max-w-xs text-center pointer-events-none opacity-0 transition-all duration-500"
    style="transform: translate(-50%, -50%) scale(0.8);">
    <p id="romanticText" class="text-pink-500 font-display font-bold text-base sm:text-lg"></p>
  </div>

  <!-- ======================== SCRIPTS ======================== -->
  <script src="script.js"></script>
</body>
</html>
